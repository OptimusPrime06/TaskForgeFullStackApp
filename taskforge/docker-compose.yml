version: '3.9'

services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: taskforge-db
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - taskforge-network

  # NestJS Backend API (Development - with watch mode)
  api:
    build:
      context: .
      dockerfile: ./app/api/Dockerfile
    container_name: taskforge-api
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      NODE_ENV: development
      DB_HOST: db
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN}
      API_PORT: ${PORT}
    ports:
      - "${PORT}:${PORT}"
    networks:
      - taskforge-network
    volumes:
      - ./app/api/src:/app/src  # Hot reload - code changes trigger restart
      - ./packages/shared:/packages/shared  # Hot reload shared package
      - /app/node_modules  # Prevent node_modules from being overwritten
      #- /app/dist  # Cache dist directory

  # React Frontend (Development - Vite dev server with hot reload)
  web:
    build:
      context: .
      dockerfile: ./app/web/Dockerfile
    container_name: taskforge-web
    depends_on:
      - api
    ports:
      - "5173:5173"
    networks:
      - taskforge-network
    volumes:
      - ./app/web/src:/app/src  # Hot reload - code changes trigger refresh
      - ./packages/shared:/packages/shared  # Hot reload shared package
      - /app/node_modules  # Prevent node_modules from being overwritten
    environment:
      VITE_API_URL: http://localhost:4500/api

networks:
  taskforge-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
